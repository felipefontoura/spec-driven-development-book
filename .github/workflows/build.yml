name: Build book (PDF + EPUB)

# Validation only. This workflow proves the book compiles in both languages;
# it never publishes the finished PDF/EPUB (no artifacts, no release attachment),
# because the book is sold on Kindle/KDP and must not be freely downloadable.
# Build the files locally for distribution: `bash kit/scripts/build.sh --all`.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.lang }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: pt-br
            source: BOOK.pt-BR.md
          - lang: en
            source: BOOK.en.md

    steps:
      - name: Checkout (with the public base25-book-kit engine submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Skip if source missing
        id: probe
        run: |
          if [[ -f "${{ matrix.source }}" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Source ${{ matrix.source }} not present — skipping ${{ matrix.lang }}."
          fi

      # Installs Node + Typst pinned by mise.toml — same toolchain as local dev.
      - name: Setup toolchain (mise → Node + Typst)
        if: steps.probe.outputs.present == 'true'
        uses: jdx/mise-action@v2

      # npm ci in the engine submodule; puppeteer downloads Chromium for Mermaid.
      - name: Install engine dependencies
        if: steps.probe.outputs.present == 'true'
        working-directory: kit
        run: npm ci --no-audit --no-fund
        env:
          PUPPETEER_SKIP_DOWNLOAD: "false"

      - name: Build PDF + EPUB + cover (validation only — not published)
        if: steps.probe.outputs.present == 'true'
        env:
          SOURCE_MD: ${{ matrix.source }}
        run: bash kit/scripts/build.sh --all

      - name: Confirm the three outputs exist
        if: steps.probe.outputs.present == 'true'
        run: |
          test -f "dist/book-${{ matrix.lang }}.pdf"
          test -f "dist/book-${{ matrix.lang }}.epub"
          test -f "dist/cover-${{ matrix.lang }}.png"
          echo "OK ${{ matrix.lang }}: PDF + EPUB + cover built (kept private, not uploaded)"
