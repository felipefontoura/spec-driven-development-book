name: Build book (PDF + EPUB)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # needed for the release upload on tags

jobs:
  build:
    name: Build ${{ matrix.lang }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: pt-br
            source: BOOK.pt-BR.md
          - lang: en
            source: BOOK.en.md

    steps:
      - name: Checkout (with the public base25-book-kit engine submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Skip if source missing
        id: probe
        run: |
          if [[ -f "${{ matrix.source }}" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Source ${{ matrix.source }} not present — skipping ${{ matrix.lang }}."
          fi

      # Installs Node + Typst pinned by mise.toml — same toolchain as local dev.
      - name: Setup toolchain (mise → Node + Typst)
        if: steps.probe.outputs.present == 'true'
        uses: jdx/mise-action@v2

      # npm ci in the engine submodule; puppeteer downloads Chromium for Mermaid.
      - name: Install engine dependencies
        if: steps.probe.outputs.present == 'true'
        working-directory: kit
        run: npm ci --no-audit --no-fund
        env:
          PUPPETEER_SKIP_DOWNLOAD: "false"

      - name: Build PDF + EPUB + cover
        if: steps.probe.outputs.present == 'true'
        env:
          SOURCE_MD: ${{ matrix.source }}
        run: bash kit/scripts/build.sh --all

      - name: Upload artifacts
        if: steps.probe.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: book-${{ matrix.lang }}
          path: |
            dist/book-${{ matrix.lang }}.pdf
            dist/book-${{ matrix.lang }}.epub
            dist/cover-${{ matrix.lang }}.png
          if-no-files-found: error
          retention-days: 14

      - name: Attach to Release (tag pushes only)
        if: steps.probe.outputs.present == 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/book-${{ matrix.lang }}.pdf
            dist/book-${{ matrix.lang }}.epub
            dist/cover-${{ matrix.lang }}.png
